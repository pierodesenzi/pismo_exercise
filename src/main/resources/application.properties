spring.application.name=transaction-app

# Database Configuration
spring.datasource.url=jdbc:postgresql://db:5432/transactiondb
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration - Hibernate creates tables automatically
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Enable SQL script initialization (schema.sql then data.sql)
spring.sql.init.mode=always

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true